<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>2026 双 AI 体系供应链网络图</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a12;
  --panel:#101421;
  --panel-2:#151a28;
  --text:#f5f7fb;
  --muted:#aab2c5;
  --soft:#6e7891;
  --line:rgba(255,255,255,.1);
  --us:#5ea8ff;
  --us-2:#1e6bd6;
  --cn:#ff6b62;
  --cn-2:#c6312b;
  --shared:#f6b84a;
  --gold:#f7c948;
  --danger:#ff4d5e;
}
html,body{height:100%}
body{
  background:
    radial-gradient(circle at 16% 8%,rgba(94,168,255,.12),transparent 26%),
    radial-gradient(circle at 78% 18%,rgba(255,107,98,.10),transparent 28%),
    linear-gradient(180deg,#080a12 0%,#0a0d18 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei","PingFang SC",Arial,sans-serif;
  overflow:hidden;
}
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  min-height:64px;
  z-index:50;
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:rgba(8,10,18,.95);
  backdrop-filter:blur(14px);
}
.brand{display:flex;align-items:center;gap:10px;min-width:300px}
.brand-mark{
  width:30px;
  height:30px;
  border-radius:7px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,rgba(94,168,255,.95),rgba(255,107,98,.92));
  color:#fff;
  font-size:17px;
  font-weight:900;
}
h1{font-size:20px;line-height:1.15;letter-spacing:0;font-weight:900}
.year{
  padding:5px 9px;
  border-radius:6px;
  background:#194fc3;
  color:#fff;
  font-size:12px;
  font-weight:900;
}
.hint{
  margin-left:auto;
  color:#d9e4ff;
  background:rgba(94,168,255,.11);
  border:1px solid rgba(94,168,255,.22);
  border-radius:7px;
  padding:7px 10px;
  font-size:12px;
  white-space:nowrap;
}
.old-link{
  color:#f7d88a;
  text-decoration:none;
  border:1px solid rgba(247,200,72,.25);
  border-radius:7px;
  padding:7px 10px;
  font-size:12px;
  font-weight:800;
}
.page{
  position:fixed;
  top:64px;
  left:0;
  right:0;
  bottom:0;
  display:grid;
  grid-template-columns:minmax(0,1fr);
}
.page.has-details{grid-template-columns:minmax(0,1fr) 420px}
.map-shell{
  position:relative;
  min-width:0;
  border-right:1px solid rgba(255,255,255,.08);
}
.map-scroll{
  position:absolute;
  inset:0;
  overflow:auto;
  scrollbar-color:rgba(255,255,255,.35) rgba(255,255,255,.07);
  scrollbar-width:thin;
}
.map-inner{
  position:relative;
  width:max-content;
  min-width:1900px;
  min-height:1430px;
  padding:26px 34px 34px 48px;
}
#links{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  overflow:visible;
}
.map-grid{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(7,250px);
  gap:18px;
  align-items:start;
}
.layer-col{
  display:grid;
  grid-template-rows:40px 340px 560px 400px;
  gap:12px;
}
.layer-title{
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#dfe7ff;
  font-size:13px;
  font-weight:900;
  letter-spacing:0;
  border-radius:7px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(255,255,255,.045);
}
.lane{
  position:relative;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.075);
  padding:28px 8px 8px;
  overflow:visible;
}
.lane::before{
  content:attr(data-label);
  position:absolute;
  top:8px;
  left:10px;
  color:rgba(255,255,255,.72);
  font-size:10px;
  font-weight:900;
  letter-spacing:.3px;
}
.lane-us{background:linear-gradient(180deg,rgba(42,91,173,.22),rgba(24,45,84,.16));border-color:rgba(94,168,255,.18)}
.lane-shared{background:linear-gradient(180deg,rgba(246,184,74,.14),rgba(122,91,28,.08));border-color:rgba(246,184,74,.22)}
.lane-china{background:linear-gradient(180deg,rgba(183,49,43,.20),rgba(82,24,23,.13));border-color:rgba(255,107,98,.2)}
.cards{display:flex;flex-direction:column;gap:8px}
.card{
  position:relative;
  min-height:168px;
  border-radius:8px;
  padding:13px 12px 12px;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.1);
  transition:opacity .16s ease,filter .16s ease,transform .16s ease,box-shadow .16s ease,border-color .16s ease;
  overflow:hidden;
}
.card:hover{transform:translateY(-1px)}
.card.us_allies{
  background:linear-gradient(180deg,rgba(38,91,184,.46),rgba(20,41,83,.82));
  border-color:rgba(94,168,255,.32);
}
.card.china{
  background:linear-gradient(180deg,rgba(170,47,42,.46),rgba(80,24,23,.84));
  border-color:rgba(255,107,98,.35);
}
.card.shared{
  background:linear-gradient(180deg,rgba(118,85,22,.58),rgba(43,37,27,.9));
  border-color:rgba(246,184,74,.36);
}
.card::after{
  content:"";
  position:absolute;
  inset:auto -20px -34px auto;
  width:96px;
  height:96px;
  border-radius:50%;
  background:rgba(255,255,255,.06);
  pointer-events:none;
}
.card.dim{opacity:.2;filter:saturate(.28) brightness(.82)}
.card.lit{opacity:1;filter:brightness(1.16)}
.card.selected{
  outline:2px solid rgba(247,201,72,.96);
  box-shadow:0 0 0 2px rgba(247,201,72,.18),0 0 24px rgba(247,201,72,.42);
  z-index:4;
}
.card.bottleneck{border-color:rgba(255,77,94,.75)}
.card.bottleneck .pulse{
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  margin-right:5px;
  background:var(--danger);
  box-shadow:0 0 0 rgba(255,77,94,.6);
  animation:pulse 1.9s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,77,94,.45)}
  70%{box-shadow:0 0 0 8px rgba(255,77,94,0)}
  100%{box-shadow:0 0 0 0 rgba(255,77,94,0)}
}
.card-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  margin-bottom:7px;
}
.card-title{
  font-size:15px;
  line-height:1.25;
  font-weight:900;
  letter-spacing:0;
}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.badge{
  display:inline-flex;
  align-items:center;
  height:18px;
  padding:0 6px;
  border-radius:4px;
  font-size:10px;
  font-weight:900;
  color:#fff;
  background:rgba(255,255,255,.12);
  white-space:nowrap;
}
.badge.invest{background:rgba(247,201,72,.22);color:#ffe68a}
.badge.bottle{background:rgba(255,77,94,.2);color:#ffc4cb}
.badge.dep{background:rgba(94,168,255,.17);color:#cde2ff}
.reps{
  color:#e8edf8;
  font-size:11px;
  line-height:1.45;
  margin-bottom:7px;
}
.reps .side{
  display:block;
  color:#cfd7e8;
}
.reps .side strong{
  color:#fff;
  font-weight:900;
}
.logic{
  color:rgba(230,236,250,.72);
  font-size:11px;
  line-height:1.45;
}
.legend{
  position:absolute;
  left:58px;
  bottom:22px;
  z-index:4;
  display:flex;
  gap:9px;
  flex-wrap:wrap;
  max-width:1080px;
  padding:9px 10px;
  border-radius:8px;
  background:rgba(8,10,18,.82);
  border:1px solid rgba(255,255,255,.09);
  color:var(--muted);
  font-size:11px;
}
.legend-item{display:flex;align-items:center;gap:6px}
.dot{width:9px;height:9px;border-radius:50%}
.dot.us{background:var(--us)}
.dot.cn{background:var(--cn)}
.dot.shared{background:var(--shared)}
.dot.gold{background:var(--gold)}
.dot.red{background:var(--danger)}
.details{
  display:none;
  position:relative;
  min-width:0;
  background:linear-gradient(180deg,rgba(16,20,33,.98),rgba(9,12,20,.98));
  overflow:auto;
  padding:18px;
}
.details.drawer-open{display:block}
.detail-card{
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.045);
  padding:16px;
}
.detail-kicker{
  display:inline-flex;
  align-items:center;
  height:22px;
  padding:0 8px;
  border-radius:5px;
  font-size:11px;
  font-weight:900;
  margin-bottom:10px;
  color:#fff;
}
.detail-kicker.us_allies{background:rgba(94,168,255,.22);color:#cde2ff}
.detail-kicker.china{background:rgba(255,107,98,.22);color:#ffd1cd}
.detail-kicker.shared{background:rgba(246,184,74,.22);color:#ffe1a2}
.details h2{
  font-size:22px;
  line-height:1.2;
  letter-spacing:0;
  margin-bottom:8px;
}
.details p{
  color:#c8d0e3;
  font-size:13px;
  line-height:1.62;
  margin-bottom:12px;
}
.detail-section{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid rgba(255,255,255,.08);
}
.detail-section h3{
  color:#fff;
  font-size:12px;
  letter-spacing:.3px;
  margin-bottom:8px;
}
.detail-list{display:flex;flex-wrap:wrap;gap:6px}
.rep-groups{display:grid;grid-template-columns:1fr;gap:8px}
.rep-group{
  border-radius:8px;
  padding:10px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.08);
}
.rep-group strong{
  display:block;
  margin-bottom:7px;
  color:#fff;
  font-size:12px;
}
.compare-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}
.compare-item{
  border-radius:8px;
  padding:10px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.08);
}
.compare-item strong{
  display:block;
  margin-bottom:5px;
  color:#fff;
  font-size:12px;
}
.compare-item span{
  display:block;
  color:#c8d0e3;
  font-size:12px;
  line-height:1.55;
}
.pill{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:3px 8px;
  border-radius:5px;
  background:rgba(255,255,255,.08);
  color:#dfe6f5;
  font-size:12px;
  line-height:1.35;
}
.source-box{
  margin-top:16px;
  padding:13px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);
}
.source-box h3{font-size:12px;margin-bottom:8px;color:#fff}
.source-box a{
  color:#9ec9ff;
  display:block;
  text-decoration:none;
  font-size:11.5px;
  line-height:1.45;
  margin:6px 0;
}
.source-box a:hover{text-decoration:underline}
.empty-note{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:rgba(255,255,255,.24);
  font-size:11px;
  line-height:1.4;
  border:1px dashed rgba(255,255,255,.07);
  border-radius:7px;
}
.path-internal{stroke:rgba(135,167,221,.35)}
.path-shared{stroke:rgba(246,184,74,.34)}
.path-control{stroke:rgba(255,77,94,.36);stroke-dasharray:6 5}
.path-active{stroke:rgba(247,201,72,.95)!important;stroke-width:2.4!important;opacity:1!important}
.path-dim{opacity:.09}
@media (max-width:1100px){
  .topbar{align-items:center;min-height:76px;flex-wrap:wrap}
  .page,.page.has-details{top:76px;grid-template-columns:1fr}
  .details.drawer-open{
    position:fixed;
    left:14px;
    right:14px;
    bottom:14px;
    max-height:42vh;
    z-index:60;
    border:1px solid rgba(255,255,255,.1);
    border-radius:10px;
    box-shadow:0 18px 50px rgba(0,0,0,.5);
  }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">AI</div>
    <div>
      <h1>双 AI 体系供应链网络图</h1>
    </div>
    <span class="year">2026</span>
  </div>
  <div class="hint">悬停预览，点击锁定；再次点击取消</div>

</header>

<div class="page" id="page">
  <main class="map-shell">
    <div class="map-scroll" id="mapScroll">
      <div class="map-inner" id="mapInner">
        <svg id="links"></svg>

        <div class="legend">
          <span class="legend-item"><span class="dot us"></span>美国及盟友体系</span>

          <span class="legend-item"><span class="dot red"></span>瓶颈 / 合规风险</span>
        </div>
      </div>
    </div>
  </main>
  <aside class="details" id="details"></aside>
</div>

  layers: [

  nodes: [
    {

      role: "需求发动机：把训练、推理、长上下文和代理工作流转化为 AI 工厂建设周期。",

    {

    return `
      <div class="source-box">
        <h3>来源与口径</h3>
        ${sources.map((source) => `<a href="${esc(source.url)}" target="_blank" rel="noreferrer">${esc(source.label)}</a>`).join("")}
      </div>
    `;
  }

  function endpoint(rect, towardRight) {
    return {
      x: towardRight ? rect.right : rect.left,
      y: rect.top + rect.height / 2
    };
  }

  function drawLines(highlightId = null) {
    svg.setAttribute("width", mapInner.scrollWidth);
    svg.setAttribute("height", mapInner.scrollHeight);
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    const mapRect = mapInner.getBoundingClientRect();
    edges.forEach((edge) => {
      const a = document.getElementById(edge.source);
      const b = document.getElementById(edge.target);
      if (!a || !b) return;
      const ar = a.getBoundingClientRect();
      const br = b.getBoundingClientRect();
      const aCenter = ar.left + ar.width / 2;
      const bCenter = br.left + br.width / 2;
      const start = endpoint(ar, aCenter <= bCenter);
      const end = endpoint(br, bCenter < aCenter);
      const x1 = start.x - mapRect.left;
      const y1 = start.y - mapRect.top;
      const x2 = end.x - mapRect.left;
      const y2 = end.y - mapRect.top;
      const dx = Math.max(70, Math.abs(x2 - x1) * .42);
      const c1 = x1 <= x2 ? x1 + dx : x1 - dx;
      const c2 = x1 <= x2 ? x2 - dx : x2 + dx;
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", `M ${x1} ${y1} C ${c1} ${y1}, ${c2} ${y2}, ${x2} ${y2}`);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke-width", edge.type === "control" ? "1.5" : "1.25");
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("class", edge.type === "control" ? "path-control" : edge.type === "shared" ? "path-shared" : "path-internal");
      const active = highlightId && (edge.source === highlightId || edge.target === highlightId);
      const related = highlightId && (adj[highlightId]?.has(edge.source) || adj[highlightId]?.has(edge.target) || edge.source === highlightId || edge.target === highlightId);
      if (active) path.classList.add("path-active");
      if (highlightId && !related) path.classList.add("path-dim");
      svg.appendChild(path);
    });
  }

  function applyFocus(id = activeId()) {
    document.querySelectorAll(".card").forEach((card) => {
      const connected = id && (adj[id]?.has(card.id) || card.id === id);
      card.classList.toggle("lit", Boolean(connected));
      card.classList.toggle("dim", Boolean(id && !connected));
      card.classList.toggle("selected", Boolean(selectedId && card.id === selectedId));
    });
    drawLines(id);
  }

  function scheduleDraw() {
    requestAnimationFrame(() => drawLines(activeId()));
  }

  renderMap();
  closeDetails();
  requestAnimationFrame(() => {
    drawLines();
    mapScroll.scrollLeft = 0;
  });
  mapScroll.addEventListener("scroll", () => drawLines(activeId()), { passive: true });
  window.addEventListener("resize", () => drawLines(activeId()));
  document.fonts?.ready?.then(scheduleDraw);
})();
</script>
</body>
</html>
